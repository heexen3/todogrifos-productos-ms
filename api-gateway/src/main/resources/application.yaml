server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: productos-ms
          uri: lb://productos-ms
          predicates:
            - Path=/api/productos, /api/productos/**
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka