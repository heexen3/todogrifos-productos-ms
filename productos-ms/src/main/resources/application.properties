spring.application.name=productos-ms
server.port=8081

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# URL de conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3307/db_productosms?createDatabaseIfNotExist=true
# Usuario de la bd
spring.datasource.username=root
# Contraseña del usuario
spring.datasource.password=

# Estrategia de gestión del esquema de la base de datos (creación, actualización)
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL generadas en la consola
spring.jpa.show-sql=true
# Formatear las consultas SQL generadas por Hibernate
spring.jpa.properties.hibernate.format_sql=true
# Dialecto específico de la base de datos utilizado por Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

