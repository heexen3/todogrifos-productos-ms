spring.application.name=productos-ms
server.port=8081

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# URL de conexion a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3307/db_productosms?createDatabaseIfNotExist=true
# Usuario de la bd
spring.datasource.username=root
# ContraseÒa del usuario
spring.datasource.password=

# Estrategia de gestion del esquema de la base de datos (creacion, actualizacion)
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL generadas en la consola
spring.jpa.show-sql=true
# Formatear las consultas SQL generadas por Hibernate
spring.jpa.properties.hibernate.format_sql=true
# Dialecto especifico de la base de datos utilizado por Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# URL del servidor de descubrimiento
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/